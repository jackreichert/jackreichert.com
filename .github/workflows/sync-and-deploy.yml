name: Sync from WordPress & Deploy

on:
  # Every push to main rebuilds + deploys (CSS, fonts, templates, content, …)
  push:
    branches: [main]
  # Manual trigger from the Actions tab
  workflow_dispatch:
  # Poll WordPress.com for new publishes/updates
  schedule:
    - cron: "0 */3 * * *" # every 3 hours (UTC)

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  sync-build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # Pull WP only on schedule or manual runs (not on every design push).
      - name: Sync content from WordPress
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: npm run sync

      - name: Commit synced content
        id: sync_commit
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content assets/images
          if ! git diff --cached --quiet; then
            git commit -m "Sync content from WordPress ($(date -u +%Y-%m-%dT%H:%M:%SZ))"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "No content changes."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      # Always build on push / manual. On schedule, only when sync changed content.
      - name: Build site
        if: >
          github.event_name == 'push' ||
          github.event_name == 'workflow_dispatch' ||
          steps.sync_commit.outputs.changed == 'true'
        env:
          PATH_PREFIX: /
        run: npm run build

      - if: >
          github.event_name == 'push' ||
          github.event_name == 'workflow_dispatch' ||
          steps.sync_commit.outputs.changed == 'true'
        uses: actions/configure-pages@v5

      - if: >
          github.event_name == 'push' ||
          github.event_name == 'workflow_dispatch' ||
          steps.sync_commit.outputs.changed == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - id: deployment
        if: >
          github.event_name == 'push' ||
          github.event_name == 'workflow_dispatch' ||
          steps.sync_commit.outputs.changed == 'true'
        uses: actions/deploy-pages@v4
